name: cmake

on:
  workflow_call:

env:
  BUILD_DIR: build-cmake
  CPM_SOURCE_CACHE: ${{ github.workspace }}/.cache/cpm
  CCACHE_DIR: ${{ github.workspace }}/.cache/ccache
  SCCACHE_DIR: ${{ github.workspace }}/.cache/sccache
  CCACHE_BASEDIR: ${{ github.workspace }}
  SCCACHE_BASEDIRS: ${{ github.workspace }}
  CCACHE_COMPILERCHECK: content
  CCACHE_MAXSIZE: 2G
  SCCACHE_CACHE_SIZE: 2G

jobs:
  build:
    name: ${{ matrix.os_label }} | ${{ matrix.toolchain }} | ${{ matrix.build_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # prettier-ignore
      matrix:
        include: 
          # Windows - MSVC
          - { os_label: windows, os: windows-2025, toolchain: msvc,        build_name: debug,                 cmake_args: "" }
          - { os_label: windows, os: windows-2025, toolchain: msvc,        build_name: asan,                  cmake_args: "-DETD_SANITIZE_ADDRESS=ON" }
          - { os_label: windows, os: windows-2025, toolchain: msvc,        build_name: no-exceptions,         cmake_args: "-DETD_ENABLE_EXCEPTIONS=OFF" }

          # Windows - Clang-CL
          - { os_label: windows, os: windows-2025, toolchain: clang-cl,    build_name: debug,                 cmake_args: "" }
          - { os_label: windows, os: windows-2025, toolchain: clang-cl,    build_name: relwithdebinfo,        cmake_args: "" }
          - { os_label: windows, os: windows-2025, toolchain: clang-cl,    build_name: asan,                  cmake_args: "-DETD_SANITIZE_ADDRESS=ON" }
          - { os_label: windows, os: windows-2025, toolchain: clang-cl,    build_name: no-exceptions+no-rtti, cmake_args: "-DETD_ENABLE_EXCEPTIONS=OFF -DETD_ENABLE_RTTI=OFF" }

          # Windows - MinGW
          - { os_label: windows, os: windows-2025, toolchain: mingw,       build_name: debug,                 cmake_args: "" }
          - { os_label: windows, os: windows-2025, toolchain: mingw,       build_name: relwithdebinfo,        cmake_args: "" }
          - { os_label: windows, os: windows-2025, toolchain: mingw,       build_name: no-exceptions+no-rtti, cmake_args: "-DETD_ENABLE_EXCEPTIONS=OFF -DETD_ENABLE_RTTI=OFF" }

          # Linux - GCC
          - { os_label: linux,   os: ubuntu-24.04, toolchain: gcc,         build_name: debug,                 cmake_args: "" }
          - { os_label: linux,   os: ubuntu-24.04, toolchain: gcc,         build_name: relwithdebinfo,        cmake_args: "" }
          - { os_label: linux,   os: ubuntu-24.04, toolchain: gcc,         build_name: asan,                  cmake_args: "-DETD_SANITIZE_ADDRESS=ON" }
          - { os_label: linux,   os: ubuntu-24.04, toolchain: gcc,         build_name: ubsan,                 cmake_args: "-DETD_SANITIZE_UNDEFINED=ON" }

          # Linux - Clang
          - { os_label: linux,   os: ubuntu-24.04, toolchain: clang,       build_name: debug,                 cmake_args: "" }
          - { os_label: linux,   os: ubuntu-24.04, toolchain: clang,       build_name: asan+ubsan,            cmake_args: "-DETD_SANITIZE_ADDRESS=ON -DETD_SANITIZE_UNDEFINED=ON" }
          - { os_label: linux,   os: ubuntu-24.04, toolchain: clang,       build_name: tsan,                  cmake_args: "-DETD_SANITIZE_THREAD=ON" }
          - { os_label: linux,   os: ubuntu-24.04, toolchain: clang,       build_name: no-exceptions,         cmake_args: "-DETD_ENABLE_EXCEPTIONS=OFF" }

          # macOS - Apple Clang
          - { os_label: macos,   os: macos-15,     toolchain: apple-clang, build_name: debug,                 cmake_args: "" }
          - { os_label: macos,   os: macos-15,     toolchain: apple-clang, build_name: asan+ubsan,            cmake_args: "-DETD_SANITIZE_ADDRESS=ON -DETD_SANITIZE_UNDEFINED=ON" }

          # macOS - Clang
          - { os_label: macos,   os: macos-15,     toolchain: clang,       build_name: debug,                 cmake_args: "" }
          - { os_label: macos,   os: macos-15,     toolchain: clang,       build_name: relwithdebinfo,        cmake_args: "" }
          - { os_label: macos,   os: macos-15,     toolchain: clang,       build_name: no-exceptions+no-rtti, cmake_args: "-DETD_ENABLE_EXCEPTIONS=OFF -DETD_ENABLE_RTTI=OFF" }

    steps:
      - name: Derive toolchain variables
        shell: bash
        run: |
          # Build type: debug -> Debug, everything else -> RelWithDebInfo
          if [[ "${{ matrix.build_name }}" == "debug" ]]; then
            echo "BUILD_TYPE=Debug" >> "$GITHUB_ENV"
          else
            echo "BUILD_TYPE=RelWithDebInfo" >> "$GITHUB_ENV"
          fi

          # Toolchain-specific: PIXI_ENV, CC, CXX, COMPILER_CACHE, CACHE_KEY, NEEDS_MSVC_ENV
          case "${{ matrix.os_label }}-${{ matrix.toolchain }}" in
            linux-gcc)
              echo "PIXI_ENV=linux-gcc"; echo "CC=gcc"; echo "CXX=g++"; echo "COMPILER_CACHE=ccache"; echo "CACHE_KEY=linux-gcc" ;;
            linux-clang)
              echo "PIXI_ENV=linux-clang"; echo "CC=clang"; echo "CXX=clang++"; echo "COMPILER_CACHE=ccache"; echo "CACHE_KEY=linux-clang" ;;
            macos-apple-clang)
              echo "PIXI_ENV=default"; echo "CC=/usr/bin/clang"; echo "CXX=/usr/bin/clang++"; echo "COMPILER_CACHE=ccache"; echo "CACHE_KEY=macos-appleclang" ;;
            macos-clang)
              echo "PIXI_ENV=macos-clang"; echo "CC=clang"; echo "CXX=clang++"; echo "COMPILER_CACHE=ccache"; echo "CACHE_KEY=macos-clang" ;;
            windows-msvc)
              echo "PIXI_ENV=windows-msvc"; echo "CC=cl"; echo "CXX=cl"; echo "COMPILER_CACHE=sccache"; echo "CACHE_KEY=windows-msvc"; echo "NEEDS_MSVC_ENV=true" ;;
            windows-clang-cl)
              echo "PIXI_ENV=windows-llvm"; echo "CC=clang-cl"; echo "CXX=clang-cl"; echo "COMPILER_CACHE=sccache"; echo "CACHE_KEY=windows-clang-cl"; echo "NEEDS_MSVC_ENV=true" ;;
            windows-mingw)
              echo "PIXI_ENV=windows-mingw"; echo "CC=gcc"; echo "CXX=g++"; echo "COMPILER_CACHE=sccache"; echo "CACHE_KEY=windows-mingw" ;;
          esac >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          pixi-version: v0.61.0
          environments: ${{ env.PIXI_ENV }}
          activate-environment: true
          cache: true

      - name: Setup MSVC environment
        if: env.NEEDS_MSVC_ENV == 'true'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Restore CPM cache
        uses: actions/cache@v4
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: cpm-${{ runner.os }}-${{ hashFiles('pixi.lock', '.github/workflows/cmake.yml', 'CMakeLists.txt', 'src/**/CMakeLists.txt') }}
          restore-keys: |
            cpm-${{ runner.os }}-

      - name: Restore compiler cache
        uses: actions/cache@v4
        with:
          path: ${{ env.COMPILER_CACHE == 'sccache' && env.SCCACHE_DIR || env.CCACHE_DIR }}
          key: ${{ env.COMPILER_CACHE }}-${{ runner.os }}-${{ env.CACHE_KEY }}-${{ matrix.build_name }}-${{ github.sha }}
          restore-keys: |
            ${{ env.COMPILER_CACHE }}-${{ runner.os }}-${{ env.CACHE_KEY }}-${{ matrix.build_name }}-
            ${{ env.COMPILER_CACHE }}-${{ runner.os }}-${{ env.CACHE_KEY }}-
            ${{ env.COMPILER_CACHE }}-${{ runner.os }}-

      - name: Configure, build, and test
        shell: bash
        run: |
          set -euxo pipefail
          if [[ "${{ env.COMPILER_CACHE }}" == "ccache" ]]; then
            ccache --zero-stats || true
          else
            sccache --stop-server || true
            sccache --zero-stats || true
          fi
          build_dir="${BUILD_DIR}-${{ matrix.build_name }}"

          if [[ "${{ runner.os }}" == "macOS" && "${{ env.CC }}" == "clang" ]]; then
            export SDKROOT="$(xcrun --sdk macosx --show-sdk-path)"
            export CONDA_BUILD_SYSROOT="${SDKROOT}"
            cmake -S . -B "${build_dir}" -G Ninja \
              -DCMAKE_BUILD_TYPE="${{ env.BUILD_TYPE }}" \
              -DCMAKE_C_COMPILER="${{ env.CC }}" \
              -DCMAKE_CXX_COMPILER="${{ env.CXX }}" \
              -DCMAKE_OSX_SYSROOT="${SDKROOT}" \
              -DCMAKE_C_FLAGS="--sysroot=${SDKROOT}" \
              -DCMAKE_CXX_FLAGS="--sysroot=${SDKROOT}" \
              -DCMAKE_EXE_LINKER_FLAGS="-fuse-ld=lld --sysroot=${SDKROOT}" \
              -DCMAKE_SHARED_LINKER_FLAGS="-fuse-ld=lld --sysroot=${SDKROOT}" \
              -DCMAKE_MODULE_LINKER_FLAGS="-fuse-ld=lld --sysroot=${SDKROOT}" \
              -DETD_BUILD_ALL_TESTS=ON \
              -DETD_USE_CPM_FOR_TESTS=ON \
              -DETD_ENABLE_CCACHE=ON \
              ${{ matrix.cmake_args }}
          else
            cmake -S . -B "${build_dir}" -G Ninja \
              -DCMAKE_BUILD_TYPE="${{ env.BUILD_TYPE }}" \
              -DCMAKE_C_COMPILER="${{ env.CC }}" \
              -DCMAKE_CXX_COMPILER="${{ env.CXX }}" \
              -DETD_BUILD_ALL_TESTS=ON \
              -DETD_USE_CPM_FOR_TESTS=ON \
              -DETD_ENABLE_CCACHE=ON \
              ${{ matrix.cmake_args }}
          fi

          cmake --build "${build_dir}" --parallel
          ctest --test-dir "${build_dir}" --verbose

      - name: Show compiler cache stats
        shell: bash
        run: |
          if [[ "${{ env.COMPILER_CACHE }}" == "ccache" ]]; then
            ccache --show-stats --verbose || true
          else
            sccache --show-stats || true
            sccache --stop-server || true
          fi
